<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1ba4df"/>
      <stop offset="0.45" stop-color="#1187c4"/>
      <stop offset="1" stop-color="#09618e"/>
    </linearGradient>
    <radialGradient id="light" cx="48%" cy="30%" r="72%">
      <stop offset="0" stop-color="#58c3ef" stop-opacity="0.35"/>
      <stop offset="0.58" stop-color="#1597d1" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#043a5a" stop-opacity="0.22"/>
    </radialGradient>
    <filter id="grain" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.95" numOctaves="3" seed="9"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.08"/>
      </feComponentTransfer>
    </filter>
    <g id="mark">
      <circle cx="56" cy="44" r="28" fill="none" stroke="#044565" stroke-width="18"/>
      <circle cx="18" cy="70" r="8" fill="#ff6a00"/>
      <path d="M19 92h35l24 42H48z" fill="#044565"/>
      <text x="46" y="158" fill="#043f5d" font-family="Arial, sans-serif" font-size="22" font-weight="800" transform="rotate(-10 46 158)">TMG</text>
    </g>
    <pattern id="logos" width="250" height="180" patternUnits="userSpaceOnUse" patternTransform="rotate(-12)">
      <use href="#mark" x="18" y="-8" opacity="0.88"/>
      <use href="#mark" x="144" y="88" opacity="0.88"/>
    </pattern>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#light)"/>
  <rect width="1920" height="1080" fill="url(#logos)" opacity="0.82"/>
  <rect width="1920" height="1080" filter="url(#grain)" opacity="0.62"/>
  <path d="M0 0h1920v1080H0z" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="2"/>
